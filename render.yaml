services:
  - type: web
    name: scorelib-backend
    root: backend
    runtime: python
    pythonVersion: 3.12
    buildCommand: |
      apt-get update && \
      apt-get install -y --no-install-recommends \
        tesseract-ocr \
        libtesseract-dev \
        libpoppler-cpp-dev \
        poppler-utils && \
      pip install --no-cache-dir -r requirements.txt
    startCommand: |
      apt-get update && \
      apt-get install -y --no-install-recommends \
        tesseract-ocr \
        libtesseract-dev \
        libpoppler-cpp-dev \
        poppler-utils && \
      python -m uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TESSERACT_PATH
        value: /usr/bin/tesseract
    envVars:
      - key: MONGO_URL
        sync: false
      - key: GOOGLE_VISION_API_KEY
        sync: false
      - key: GOOGLE_CLOUD_VISION_API_KEY
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false

