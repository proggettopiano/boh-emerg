services:
  - type: web
    name: scorelib-backend
    env: docker
    dockerfilePath: Dockerfile
    envVars:
      - key: TESSERACT_PATH
        value: /usr/bin/tesseract
      - key: MONGO_URL
        sync: false
      - key: GOOGLE_VISION_API_KEY
        sync: false
      - key: GOOGLE_CLOUD_VISION_API_KEY
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false

